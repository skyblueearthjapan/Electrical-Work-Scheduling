<script>
/* =========================================================
   電気工事スケジューリング — フロントエンド
   Store / API / SaveQueue / App / Gantt / Calendar / Todo / Modal
   ========================================================= */

/* ================= Utils ================= */
const Utils = {
  esc: (s) => String(s == null ? '' : s),  // textContent用。innerHTML禁止。
  escAttr: (s) => String(s == null ? '' : s).replace(/"/g, '&quot;'),
  parseDate(s) {
    if (!s) return null;
    if (s instanceof Date) return s;
    const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return null;
    return new Date(+m[1], +m[2] - 1, +m[3]);
  },
  fmtDate(d) {
    if (!d) return '';
    if (typeof d === 'string') d = Utils.parseDate(d);
    if (!d) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  },
  daysBetween(a, b) {
    const da = Utils.parseDate(a);
    const db = Utils.parseDate(b);
    if (!da || !db) return 0;
    return Math.round((db - da) / 86400000);
  },
  addDays(s, n) {
    const d = Utils.parseDate(s);
    if (!d) return s;
    d.setDate(d.getDate() + n);
    return Utils.fmtDate(d);
  },
  genDateRange(start, days) {
    const out = [];
    for (let i = 0; i < days; i++) out.push(Utils.addDays(start, i));
    return out;
  },
  dow(dateStr) {
    const d = Utils.parseDate(dateStr);
    if (!d) return '';
    return ['日','月','火','水','木','金','土'][d.getDay()];
  },
  isWeekend(dateStr) {
    const d = Utils.parseDate(dateStr);
    if (!d) return false;
    const w = d.getDay();
    return w === 0 || w === 6;
  },
  uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0;
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  },
  debounce(fn, ms) {
    let t;
    return function() {
      clearTimeout(t);
      const args = arguments;
      t = setTimeout(() => fn.apply(null, args), ms);
    };
  },
  hexWithAlpha(hex, a) {
    if (!hex || hex[0] !== '#') return hex;
    const h = hex.length === 4
      ? '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3]
      : hex;
    const alpha = Math.round(a * 255).toString(16).padStart(2, '0');
    return h + alpha;
  }
};

/* ================= API ================= */
const API = {
  call(fn, ...args) {
    return new Promise((resolve, reject) => {
      if (typeof google === 'undefined' || !google.script) {
        // Local dev fallback
        console.warn('[API] GAS environment unavailable. Stubbing:', fn);
        resolve(null);
        return;
      }
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler((err) => reject(new Error(err && err.message ? err.message : String(err))))
        [fn](...args);
    });
  }
};

/* ================= Store ================= */
const Store = {
  state: {
    user: { email: '', role: 'none' },
    processes: [],
    contractors: [],
    okuSchedules: [],
    contractorSchedules: [],
    todos: [],
    jobs: [],
    ghostSchedules: [],
    today: '',
    // UI state
    currentTab: 'gantt',
    ganttDays: 180,
    ganttStartDate: null,
    ganttOkuRows: [],  // [{ 工番 }]
    activeContractorTab: null,
    okuCalendar: null,
    contractorCalendars: {}
  },

  init(bootstrap) {
    Object.assign(this.state, bootstrap);
    // Start gantt 7 days before today so today is past the sticky 220px row label
    // and clearly clickable (7 cells × 32px = 224px > 220px label width).
    this.state.ganttStartDate = Utils.addDays(this.state.today, -7);
    // Use server-persisted ganttOkuRows; merge in any 工番 from existing schedules
    // that aren't yet registered as a row (legacy data safety)
    const serverRows = (bootstrap.ganttOkuRows || []).map(r => ({
      rowId: r['rowId'],
      工番: r['工番'],
      sortOrder: r['sortOrder'] || 0
    }));
    const known = new Set(serverRows.map(r => r['工番']));
    (this.state.okuSchedules || []).forEach(s => {
      if (s['工番'] && !known.has(s['工番'])) {
        serverRows.push({ rowId: null, 工番: s['工番'], sortOrder: Date.now() });
        known.add(s['工番']);
      }
    });
    serverRows.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
    this.state.ganttOkuRows = serverRows;
    this.state.activeContractorTab = (this.state.contractors[0] || {}).contractorId || null;
  },

  getProcessById(id) {
    return this.state.processes.find(p => p['processId'] === id) || null;
  },
  getProcessColor(id) {
    const p = this.getProcessById(id);
    return (p && p['色']) || '#60A5FA';
  },
  getContractorById(id) {
    return this.state.contractors.find(c => c['contractorId'] === id) || null;
  },
  getContractorColor(id) {
    const c = this.getContractorById(id);
    return (c && c['識別色']) || '#6B7687';
  },
  getJobByNo(jobNo) {
    return this.state.jobs.find(j => j['工番'] === jobNo) || null;
  }
};

/* ================= SaveQueue ================= */
/* Optimistic UI + 3s debounce + localStorage backup + beforeunload */
const SaveQueue = {
  LS_KEY: 'eleSchedSaveQueue.backup.v1',
  DEBOUNCE_MS: 3000,
  MAX_RETRIES: 3,
  pending: {},   // { id: { fnName, args, snapshot } }
  timer: null,
  isSaving: false,
  retryCount: 0,

  /**
   * @param key   string  unique op key (e.g. "oku:create:<uuid>")
   * @param fnName string  api_xxx function
   * @param args  array
   */
  enqueue(key, fnName, args) {
    this.pending[key] = { fnName, args, enqueuedAt: Date.now() };
    this.persist_();
    UI.setSaveStatus('unsaved');
    if (this.timer) clearTimeout(this.timer);
    this.timer = setTimeout(() => this.flush(), this.DEBOUNCE_MS);
  },

  persist_() {
    try {
      localStorage.setItem(this.LS_KEY, JSON.stringify(this.pending));
    } catch (e) { console.warn('LS persist fail', e); }
  },

  restore_() {
    try {
      const raw = localStorage.getItem(this.LS_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        this.pending = parsed;
        if (Object.keys(this.pending).length > 0) {
          UI.toast('未送信データを復元しています...', 'info');
          setTimeout(() => this.flush(), 1000);
        }
      }
    } catch (e) { console.warn('LS restore fail', e); }
  },

  clearLS_() {
    try { localStorage.removeItem(this.LS_KEY); } catch (e) {}
  },

  async flush() {
    if (this.isSaving) return;
    const keys = Object.keys(this.pending);
    if (keys.length === 0) {
      UI.setSaveStatus('saved');
      this.clearLS_();
      return;
    }
    this.isSaving = true;
    UI.setSaveStatus('saving');

    const snapshot = { ...this.pending };
    this.pending = {};
    this.persist_();

    let failed = 0;
    for (const k of Object.keys(snapshot)) {
      const op = snapshot[k];
      try {
        await API.call(op.fnName, ...op.args);
      } catch (err) {
        console.error('[SaveQueue] failed', k, err);
        this.pending[k] = op; // re-queue
        failed++;
      }
    }

    this.isSaving = false;

    if (failed > 0) {
      this.retryCount++;
      if (this.retryCount <= this.MAX_RETRIES) {
        UI.setSaveStatus('unsaved');
        UI.toast(`保存エラー: ${failed}件 — 再試行します`, 'error');
        this.persist_();
        this.timer = setTimeout(() => this.flush(), this.DEBOUNCE_MS);
      } else {
        UI.setSaveStatus('error');
        UI.toast('保存に失敗しました。画面を再読み込みしてください。', 'error');
        this.retryCount = 0;
      }
    } else {
      this.retryCount = 0;
      UI.setSaveStatus('saved');
      this.clearLS_();
    }
  },

  hasPending() {
    return Object.keys(this.pending).length > 0 || this.isSaving;
  }
};

/* ================= UI helpers ================= */
const UI = {
  setSaveStatus(status) {
    const el = document.getElementById('save-status');
    if (!el) return;
    el.className = 'save-status ' + status;
    el.textContent =
      status === 'saved'   ? '✓ 保存済み' :
      status === 'saving'  ? '⟳ 保存中...' :
      status === 'unsaved' ? '● 未保存' :
      status === 'error'   ? '✕ 保存エラー' : '';
  },
  toast(msg, type) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.className = 'toast show ' + (type || '');
    el.textContent = msg;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  },
  showLoading(show) {
    const el = document.getElementById('loading-overlay');
    if (!el) return;
    el.classList.toggle('hidden', !show);
  },
  openModal(html) {
    const root = document.getElementById('modal-root');
    root.innerHTML = ''; // safe because html comes from our own builders
    const bd = document.createElement('div');
    bd.className = 'modal-backdrop';
    bd.addEventListener('click', (e) => {
      if (e.target === bd) UI.closeModal();
    });
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = ''; // will be appended
    bd.appendChild(modal);
    root.appendChild(bd);
    return modal;
  },
  closeModal() {
    document.getElementById('modal-root').innerHTML = '';
  }
};

/* ================= App (init + tab switch) ================= */
const App = {
  async init() {
    UI.showLoading(true);
    try {
      SaveQueue.restore_();
      const boot = await API.call('api_bootstrap');
      if (!boot) {
        UI.showLoading(false);
        UI.toast('GAS環境外です(ローカルプレビュー)', 'info');
        return;
      }
      Store.init(boot);
      this.renderUserBadge();
      this.renderAll();

      // beforeunload guard
      window.addEventListener('beforeunload', (e) => {
        if (SaveQueue.hasPending()) {
          SaveQueue.flush();
          e.preventDefault();
          e.returnValue = '未保存のデータがあります。ページを離れますか?';
          return e.returnValue;
        }
      });

      // visibility change
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && SaveQueue.hasPending()) {
          SaveQueue.flush();
        }
      });
    } catch (err) {
      console.error(err);
      UI.toast('初期化エラー: ' + err.message, 'error');
    } finally {
      UI.showLoading(false);
    }
  },

  renderUserBadge() {
    const el = document.getElementById('user-badge');
    const u = Store.state.user;
    el.textContent = u.email ? `${u.email.split('@')[0]} (${u.role})` : '';
  },

  renderAll() {
    Gantt.render();
    OkuCalendar.render();
    ContractorCalendar.renderAll();
    Todo.render();
  },

  switchTab(name) {
    document.querySelectorAll('.tab-link').forEach(el => {
      el.classList.toggle('active', el.dataset.tab === name);
    });
    document.querySelectorAll('.tab-content').forEach(el => {
      el.classList.toggle('active', el.id === 'tab-' + name);
    });
    Store.state.currentTab = name;

    // Resize calendars on show (FullCalendar needs it) AND force refetch so
    // any schedule added from another tab is reflected immediately.
    setTimeout(() => {
      if (name === 'oku' && Store.state.okuCalendar) {
        Store.state.okuCalendar.updateSize();
        Store.state.okuCalendar.refetchEvents();
      } else if (name && name.indexOf('ctr-') === 0) {
        const ctrId = name.substring(4);
        Store.state.activeContractorTab = ctrId;
        ContractorCalendar.ensureCalendar(ctrId);
        const cal = Store.state.contractorCalendars[ctrId];
        if (cal) {
          cal.updateSize();
          cal.refetchEvents();
        }
      } else if (name === 'gantt') {
        Gantt.render();
      }
    }, 30);
  },

  /** 全データ再取得 + 再描画(全ページ共通の更新ボタン) */
  async refreshAll() {
    const btn = document.getElementById('topbar-refresh-btn');
    if (btn) btn.classList.add('spinning');
    try {
      // 未送信があればまずflush
      if (SaveQueue.hasPending()) await SaveQueue.flush();
      const boot = await API.call('api_bootstrap');
      if (!boot) {
        UI.toast('GAS環境外です', 'info');
        return;
      }
      // カレンダーは破棄して作り直し(events関数の参照を更新するため)
      try { if (Store.state.okuCalendar) Store.state.okuCalendar.destroy(); } catch (e) {}
      Object.values(Store.state.contractorCalendars || {}).forEach(c => {
        try { c.destroy(); } catch (e) {}
      });
      Store.state.okuCalendar = null;
      Store.state.contractorCalendars = {};
      Store.init(boot);
      this.renderAll();
      UI.toast('最新データを取得しました', 'success');
    } catch (err) {
      console.error(err);
      UI.toast('更新エラー: ' + err.message, 'error');
    } finally {
      if (btn) btn.classList.remove('spinning');
    }
  }
};

/* ================= Gantt ================= */
const Gantt = {
  dragState: null,

  render() {
    const start = Store.state.ganttStartDate || Store.state.today;
    const days = Store.state.ganttDays;
    const dates = Utils.genDateRange(start, days);

    this.renderHeader('gantt-oku-header', dates, true /* clickable */);
    this.renderHeader('gantt-ctr-header', dates, false);
    this.renderOkuBody(dates);
    this.renderContractorBody(dates);
    this.syncScroll();
  },

  renderHeader(elId, dates, clickable) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.innerHTML = '';
    const today = Store.state.today;
    dates.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'gantt-date-cell';
      if (Utils.isWeekend(d)) cell.classList.add('weekend');
      if (d === today) cell.classList.add('today');
      if (clickable) {
        cell.classList.add('clickable');
        cell.title = d + ' のタスクメモを開く';
        cell.addEventListener('click', () => DailyMemoModal.open(d));
      }
      const parsed = Utils.parseDate(d);
      const m = parsed.getMonth() + 1;
      const day = parsed.getDate();
      const dowName = Utils.dow(d);
      const mSpan = document.createElement('div');
      mSpan.className = 'd-month';
      mSpan.textContent = m + '月';
      const dSpan = document.createElement('div');
      dSpan.className = 'd-day';
      dSpan.textContent = day;
      const wSpan = document.createElement('div');
      wSpan.className = 'd-dow';
      wSpan.textContent = dowName;
      if (day === 1) cell.appendChild(mSpan);
      cell.appendChild(dSpan);
      cell.appendChild(wSpan);
      el.appendChild(cell);
    });
    // width
    el.style.minWidth = (dates.length * 32 + 460) + 'px';
  },

  renderOkuBody(dates) {
    const body = document.getElementById('gantt-oku-body');
    if (!body) return;
    body.innerHTML = '';

    const rows = Store.state.ganttOkuRows;
    if (rows.length === 0) {
      const empty = document.createElement('div');
      empty.style.padding = '40px';
      empty.style.textAlign = 'center';
      empty.style.color = 'var(--text-muted)';
      empty.textContent = '右上の「+ 工番追加」から工番を追加してください';
      body.appendChild(empty);
      return;
    }

    rows.forEach((row, idx) => {
      const jobNo = row['工番'];
      const job = Store.getJobByNo(jobNo);
      const schedules = Store.state.okuSchedules.filter(s => s['工番'] === jobNo);
      body.appendChild(this.buildRow({
        scope: 'oku',
        rowKey: jobNo,
        labelHtml: this.buildOkuLabel(jobNo, idx, rows.length),
        schedules,
        dates,
        job,
        showJobInfo: true
      }));
    });

    body.style.minWidth = (dates.length * 32 + 460) + 'px';
  },

  renderContractorBody(dates) {
    const body = document.getElementById('gantt-ctr-body');
    if (!body) return;
    body.innerHTML = '';
    Store.state.contractors.forEach(c => {
      const schedules = Store.state.contractorSchedules.filter(s => s['contractorId'] === c['contractorId']);
      body.appendChild(this.buildRow({
        scope: 'ctr',
        rowKey: c['contractorId'],
        labelHtml: this.buildContractorLabel(c),
        schedules,
        dates,
        showJobInfo: false
      }));
    });
    body.style.minWidth = (dates.length * 32 + 240) + 'px';
  },

  buildLabel(icon, text) {
    const el = document.createElement('div');
    el.className = 'gantt-row-label';
    const ic = document.createElement('span');
    ic.textContent = icon;
    const tx = document.createElement('span');
    tx.textContent = text;
    tx.style.color = 'var(--accent-gold-bright)';
    tx.style.fontWeight = '700';
    el.appendChild(ic);
    el.appendChild(tx);
    return el;
  },

  buildOkuLabel(jobNo, idx, total) {
    const el = document.createElement('div');
    el.className = 'gantt-row-label';
    const ic = document.createElement('span');
    ic.textContent = '🧑‍💻';
    const tx = document.createElement('span');
    tx.textContent = jobNo;
    tx.style.color = 'var(--accent-gold-bright)';
    tx.style.fontWeight = '700';
    tx.style.flex = '1';
    el.appendChild(ic);
    el.appendChild(tx);

    const acts = document.createElement('span');
    acts.className = 'row-actions';
    acts.style.cssText = 'display:inline-flex;gap:4px;margin-left:auto;';

    const mkBtn = (label, title, handler, disabled) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'row-action-btn';
      b.textContent = label;
      b.title = title;
      b.disabled = !!disabled;
      b.style.cssText =
        'background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);' +
        'color:#e5e7eb;border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;line-height:1;' +
        (disabled ? 'opacity:0.35;cursor:default;' : '');
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!b.disabled) handler();
      });
      return b;
    };

    acts.appendChild(mkBtn('▲', '上へ', () => Gantt.moveOkuRow(idx, -1), idx === 0));
    acts.appendChild(mkBtn('▼', '下へ', () => Gantt.moveOkuRow(idx, +1), idx === total - 1));
    acts.appendChild(mkBtn('×', '工番行を削除', () => Gantt.removeOkuRow(jobNo)));

    el.appendChild(acts);
    return el;
  },

  buildContractorLabel(c) {
    const el = document.createElement('div');
    el.className = 'gantt-row-label';
    const dot = document.createElement('span');
    dot.style.cssText = 'display:inline-block;width:12px;height:12px;border-radius:50%;background:' + (c['識別色']||'#999');
    const tx = document.createElement('span');
    tx.textContent = c['業者名'];
    el.appendChild(dot);
    el.appendChild(tx);
    return el;
  },

  buildRow({ scope, rowKey, labelHtml, schedules, dates, job, showJobInfo }) {
    const row = document.createElement('div');
    row.className = 'gantt-row';
    row.dataset.scope = scope;
    row.dataset.rowKey = rowKey;

    row.appendChild(labelHtml);

    const cellsWrap = document.createElement('div');
    cellsWrap.className = 'gantt-row-cells';

    const today = Store.state.today;
    dates.forEach(d => {
      const c = document.createElement('div');
      c.className = 'gantt-cell';
      c.dataset.date = d;
      if (Utils.isWeekend(d)) c.classList.add('weekend');
      if (d === today) c.classList.add('today');
      cellsWrap.appendChild(c);
    });

    // Lane assignment
    const lanes = this.assignLanes(schedules);
    const laneCount = Math.max(1, lanes.laneCount);
    const laneH = scope === 'ctr' ? 42 : 28;
    row.style.minHeight = Math.max(scope === 'ctr' ? 76 : 64, laneCount * laneH + 18) + 'px';

    // Bars
    lanes.items.forEach(s => {
      const bar = this.buildBar(s, dates, scope, laneH);
      if (bar) cellsWrap.appendChild(bar);
    });

    row.appendChild(cellsWrap);

    if (showJobInfo) {
      row.appendChild(this.buildJobInfo(job || { 工番: rowKey }));
    }

    // Drag handlers
    this.attachDragHandlers(cellsWrap, scope, rowKey);

    return row;
  },

  buildBar(s, dates, scope, laneH) {
    laneH = laneH || 28;
    const startOffset = Utils.daysBetween(dates[0], s['start']);
    const duration = Utils.daysBetween(s['start'], s['end']) + 1;
    if (startOffset + duration <= 0 || startOffset >= dates.length) return null;
    const visStart = Math.max(0, startOffset);
    const visDur = Math.min(duration, dates.length - visStart) - (visStart - startOffset < 0 ? Math.abs(visStart - startOffset) : 0);
    const left = visStart * 32;
    const width = Math.max(20, visDur * 32 - 4);
    const bar = document.createElement('div');
    bar.className = 'gantt-bar';
    const lane = s._lane || 0;
    bar.style.left = left + 'px';
    bar.style.top = (6 + lane * laneH) + 'px';
    bar.style.width = width + 'px';
    if (scope === 'ctr') bar.style.height = '36px';
    bar.style.background = s['色'] || Store.getProcessColor(s['processId']);
    // Contractor color stripe on top
    if (scope === 'ctr' && s['contractorId']) {
      bar.style.borderTopColor = Store.getContractorColor(s['contractorId']);
    }
    const name = s['工程名'] || (Store.getProcessById(s['processId']) || {})['工程名'] || '';
    if (scope === 'ctr') {
      // Two-line label: 工番 + 納入先名 / 工程名
      const job = Store.getJobByNo(s['工番']) || {};
      const line1 = document.createElement('div');
      line1.className = 'bar-line1';
      line1.textContent = `${s['工番']||''} ${job['納入先']||''}`.trim();
      const line2 = document.createElement('div');
      line2.className = 'bar-line2';
      line2.textContent = name;
      bar.appendChild(line1);
      bar.appendChild(line2);
      bar.classList.add('gantt-bar-multiline');
      bar.title = `${s['工番']||''} / ${job['納入先']||''} / ${name} / ${s['start']} - ${s['end']}${s['メモ']?' / '+s['メモ']:''}`;
    } else {
      bar.textContent = name;
      bar.title = `${name} / ${s['start']} - ${s['end']}${s['メモ']?' / '+s['メモ']:''}`;
    }
    bar.addEventListener('click', (e) => {
      e.stopPropagation();
      if (scope === 'oku') OkuModal.openEdit(s);
      else ContractorModal.openEdit(s);
    });
    return bar;
  },

  buildJobInfo(job) {
    const el = document.createElement('div');
    el.className = 'gantt-job-info';
    const jn = document.createElement('div');
    jn.className = 'jn';
    jn.textContent = job['工番'] || '';
    const jc = document.createElement('div');
    jc.className = 'jc';
    jc.textContent = job['受注先'] || '';
    const jp = document.createElement('div');
    jp.className = 'jp';
    jp.textContent = job['品名'] || '';
    el.appendChild(jn);
    el.appendChild(jc);
    el.appendChild(jp);
    return el;
  },

  assignLanes(schedules) {
    const sorted = [...schedules].sort((a, b) => String(a['start']).localeCompare(String(b['start'])));
    const laneEnds = [];
    sorted.forEach(s => {
      let placed = false;
      for (let i = 0; i < laneEnds.length; i++) {
        if (String(laneEnds[i]) < String(s['start'])) {
          s._lane = i;
          laneEnds[i] = s['end'];
          placed = true;
          break;
        }
      }
      if (!placed) {
        s._lane = laneEnds.length;
        laneEnds.push(s['end']);
      }
    });
    return { items: sorted, laneCount: laneEnds.length || 1 };
  },

  attachDragHandlers(cellsWrap, scope, rowKey) {
    let dragStart = null;
    cellsWrap.addEventListener('mousedown', (e) => {
      const cell = e.target.closest('.gantt-cell');
      if (!cell) return;
      if (e.target.closest('.gantt-bar')) return;
      e.preventDefault();
      dragStart = { date: cell.dataset.date, endDate: cell.dataset.date, cells: [cell] };
      cell.classList.add('selected');
    });
    cellsWrap.addEventListener('mousemove', (e) => {
      if (!dragStart) return;
      const cell = e.target.closest('.gantt-cell');
      if (!cell) return;
      dragStart.cells.forEach(c => c.classList.remove('selected'));
      dragStart.endDate = cell.dataset.date;
      const s = dragStart.date < dragStart.endDate ? dragStart.date : dragStart.endDate;
      const e2 = dragStart.date < dragStart.endDate ? dragStart.endDate : dragStart.date;
      const all = Array.from(cellsWrap.querySelectorAll('.gantt-cell'));
      const picked = all.filter(c => c.dataset.date >= s && c.dataset.date <= e2);
      picked.forEach(c => c.classList.add('selected'));
      dragStart.cells = picked;
    });
    document.addEventListener('mouseup', () => {
      if (!dragStart) return;
      dragStart.cells.forEach(c => c.classList.remove('selected'));
      const s = dragStart.date < dragStart.endDate ? dragStart.date : dragStart.endDate;
      const e = dragStart.date < dragStart.endDate ? dragStart.endDate : dragStart.date;
      dragStart = null;
      if (scope === 'oku') OkuModal.openNew(rowKey, s, e);
      else ContractorModal.openNew(rowKey, s, e);
    });
  },

  syncScroll() {
    const a = document.getElementById('gantt-oku-wrapper');
    const b = document.getElementById('gantt-ctr-wrapper');
    if (!a || !b) return;
    let lock = false;
    const sync = (src, dst) => () => {
      if (lock) return;
      lock = true;
      dst.scrollLeft = src.scrollLeft;
      requestAnimationFrame(() => { lock = false; });
    };
    if (!a._syncAttached) {
      a.addEventListener('scroll', sync(a, b));
      b.addEventListener('scroll', sync(b, a));
      a._syncAttached = true;
    }
  },

  openAddJobModal() {
    const modal = UI.openModal();
    modal.classList.add('modal-tall');
    modal.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">工番を追加</div>
        <button class="modal-close" onclick="UI.closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label>工番検索(番号・受注先・品名で絞り込み)</label>
          <div class="combobox">
            <input id="job-search-input" type="text" placeholder="例: LW25056" autocomplete="off">
            <div id="job-search-list" class="combobox-list"></div>
          </div>
        </div>
      </div>
    `;
    const input = document.getElementById('job-search-input');
    const list = document.getElementById('job-search-list');
    const doSearch = Utils.debounce((q) => {
      const results = (Store.state.jobs || []).filter(j => {
        const s = String(j['工番']||'') + ' ' + String(j['受注先']||'') + ' ' + String(j['品名']||'');
        return s.toLowerCase().indexOf(q.toLowerCase()) !== -1;
      }).slice(0, 20);
      list.innerHTML = '';
      if (results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'combobox-item';
        empty.textContent = '該当する工番がありません';
        list.appendChild(empty);
      } else {
        results.forEach(j => {
          const it = document.createElement('div');
          it.className = 'combobox-item';
          const jn = document.createElement('div');
          jn.className = 'ci-jn';
          jn.textContent = j['工番'];
          const meta = document.createElement('div');
          meta.className = 'ci-meta';
          meta.textContent = (j['受注先']||'') + ' / ' + (j['品名']||'');
          it.appendChild(jn);
          it.appendChild(meta);
          it.addEventListener('click', () => {
            Gantt.addOkuRow(j['工番']);
            UI.closeModal();
          });
          list.appendChild(it);
        });
      }
      list.classList.remove('hidden');
    }, 200);
    input.addEventListener('input', (e) => doSearch(e.target.value));
    input.addEventListener('focus', () => doSearch(input.value));
    setTimeout(() => input.focus(), 100);
  },

  addOkuRow(jobNo) {
    if (Store.state.ganttOkuRows.some(r => r['工番'] === jobNo)) {
      UI.toast('既に追加されています', 'info');
      return;
    }
    const tempId = Utils.uuid();
    const sortOrder = (Store.state.ganttOkuRows.length + 1) * 10;
    Store.state.ganttOkuRows.push({ rowId: tempId, 工番: jobNo, sortOrder: sortOrder });
    this.render();
    SaveQueue.enqueue('ganttOku:create:' + tempId, 'api_createGanttOkuRow',
      [{ '工番': jobNo, sortOrder: sortOrder }]);
    UI.toast(`工番 ${jobNo} を追加しました`, 'success');
  },

  removeOkuRow(jobNo) {
    const row = Store.state.ganttOkuRows.find(r => r['工番'] === jobNo);
    if (!row) return;
    const hasSchedules = Store.state.okuSchedules.some(s => s['工番'] === jobNo && !s['deletedAt']);
    const msg = hasSchedules
      ? `工番 ${jobNo} には既存スケジュールがあります。\n行を削除しても予定データ自体は残ります(再追加で復活)。\n削除しますか?`
      : `工番 ${jobNo} を削除しますか?`;
    if (!confirm(msg)) return;
    Store.state.ganttOkuRows = Store.state.ganttOkuRows.filter(r => r['工番'] !== jobNo);
    this.render();
    if (row.rowId) {
      SaveQueue.enqueue('ganttOku:delete:' + row.rowId, 'api_deleteGanttOkuRow', [row.rowId]);
    }
    UI.toast(`工番 ${jobNo} を削除しました`, 'success');
  },

  moveOkuRow(idx, delta) {
    const rows = Store.state.ganttOkuRows;
    const tgt = idx + delta;
    if (tgt < 0 || tgt >= rows.length) return;
    const tmp = rows[idx];
    rows[idx] = rows[tgt];
    rows[tgt] = tmp;
    rows.forEach((r, i) => { r.sortOrder = (i + 1) * 10; });
    this.render();
    const orderedIds = rows.map(r => r.rowId).filter(Boolean);
    SaveQueue.enqueue('ganttOku:reorder', 'api_reorderGanttOkuRows', [orderedIds]);
  }
};

/* ================= OkuCalendar ================= */
const OkuCalendar = {
  render() {
    const el = document.getElementById('oku-calendar');
    if (!el || typeof FullCalendar === 'undefined') return;
    if (Store.state.okuCalendar) return; // already initialized
    const cal = new FullCalendar.Calendar(el, {
      initialView: 'dayGridMonth',
      locale: 'ja',
      height: 'auto',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      selectable: true,
      select: (info) => {
        const end = Utils.addDays(info.endStr, -1); // FullCalendar end is exclusive
        if (Store.state.ganttOkuRows.length === 0) {
          UI.toast('先にガントで工番を追加してください', 'info');
          return;
        }
        // Use first row as default
        const firstJob = Store.state.ganttOkuRows[0]['工番'];
        OkuModal.openNew(firstJob, info.startStr, end);
      },
      eventClick: (info) => {
        const s = Store.state.okuSchedules.find(x => x['scheduleId'] === info.event.id);
        if (s) OkuModal.openEdit(s);
      },
      events: () => this.toFcEvents()
    });
    cal.render();
    Store.state.okuCalendar = cal;
  },

  toFcEvents() {
    return Store.state.okuSchedules.filter(s => !s['deletedAt']).map(s => ({
      id: s['scheduleId'],
      title: `${s['工番']} ${s['工程名']||''}`,
      start: s['start'],
      end: Utils.addDays(s['end'], 1), // inclusive→exclusive
      allDay: true,
      backgroundColor: s['色'] || '#60A5FA',
      borderColor: s['色'] || '#60A5FA'
    }));
  },

  refresh() {
    if (Store.state.okuCalendar) {
      Store.state.okuCalendar.refetchEvents();
    }
  }
};

          <div class="memo-section">
            <h3>依頼状況メモ</h3>
            <div class="memo-input-row">
              <input type="text" placeholder="新しいメモを追加..." class="ctr-todo-input" maxlength="200">
              <button class="btn-primary">追加</button>
            </div>
            <ul class="todo-list ctr-todo-list" data-ctr="${c['contractorId']}"></ul>
          </div>
        </div>
      `;
      pane.querySelector('.ctr-manager').textContent = c['担当者'] || '担当者未登録';
      pane.querySelector('.tel').textContent = c['電話番号'] || '';
      pane.querySelector('.mail').textContent = c['メール'] || '';
      const input = pane.querySelector('.ctr-todo-input');
      const btn2 = pane.querySelector('.btn-primary');
      btn2.addEventListener('click', () => {
        if (input.value.trim()) {
          Todo.add(input.value.trim(), 'contractor', c['contractorId']);
          input.value = '';
        }
      });
      container.appendChild(pane);
    });

    setTimeout(() => Todo.render(), 50);
  },

  ensureCalendar(contractorId) {
    if (Store.state.contractorCalendars[contractorId]) return;
    const el = document.getElementById('cal-' + contractorId);
    if (!el || typeof FullCalendar === 'undefined') return;
    const cal = new FullCalendar.Calendar(el, {
      initialView: 'dayGridMonth',
      locale: 'ja',
      height: 'auto',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      selectable: true,
      select: (info) => {
        const end = Utils.addDays(info.endStr, -1);
        ContractorModal.openNew(contractorId, info.startStr, end);
      },
      eventClick: (info) => {
        const s = Store.state.contractorSchedules.find(x => x['scheduleId'] === info.event.id);
        if (s) ContractorModal.openEdit(s);
      },
      events: () => this.toFcEvents(contractorId)
    });
    cal.render();
    Store.state.contractorCalendars[contractorId] = cal;
  },

  toFcEvents(contractorId) {
    return Store.state.contractorSchedules
      .filter(s => s['contractorId'] === contractorId && !s['deletedAt'])
      .map(s => ({
        id: s['scheduleId'],
        title: `${s['工番']} ${s['工程名']||''}`,
        start: s['start'],
        end: Utils.addDays(s['end'], 1),
        allDay: true,
        backgroundColor: s['色'] || '#60A5FA',
        borderColor: Store.getContractorColor(contractorId)
      }));
  },

  refresh(contractorId) {
    const cal = Store.state.contractorCalendars[contractorId];
    if (cal) cal.refetchEvents();
  }
};

/* ================= Todo ================= */
const Todo = {
  render() {
    // oku list
    const okuList = document.getElementById('oku-todo-list');
    if (okuList) {
      okuList.innerHTML = '';
      Store.state.todos.filter(t => t['scopeType'] === 'oku').forEach(t => {
        okuList.appendChild(this.buildItem(t));
      });
    }
    // contractor lists (each contractor is now a top-level tab pane)
    document.querySelectorAll('.ctr-todo-list').forEach(list => {
      const cId = list.dataset.ctr;
      if (!cId) return;
      list.innerHTML = '';
      Store.state.todos.filter(t => t['scopeType'] === 'contractor' && t['contractorId'] === cId).forEach(t => {
        list.appendChild(this.buildItem(t));
      });
    });
  },

  buildItem(t) {
    const li = document.createElement('li');
    li.className = 'todo-item' + (t['isDone'] ? ' done' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !!t['isDone'];
    cb.addEventListener('change', () => {
      t['isDone'] = cb.checked;
      li.classList.toggle('done', cb.checked);
      SaveQueue.enqueue('todo:update:' + t['todoId'], 'api_updateTodo', [t['todoId'], { isDone: cb.checked }]);
    });
    const tx = document.createElement('span');
    tx.className = 'todo-text';
    tx.textContent = t['text'] || '';
    tx.contentEditable = 'true';
    tx.addEventListener('blur', () => {
      const nv = tx.textContent.trim();
      if (nv !== t['text']) {
        t['text'] = nv;
        SaveQueue.enqueue('todo:update:' + t['todoId'], 'api_updateTodo', [t['todoId'], { text: nv }]);
      }
    });
    const acts = document.createElement('div');
    acts.className = 'todo-actions';
    const del = document.createElement('button');
    del.className = 'todo-action-btn danger';
    del.textContent = '削除';
    del.addEventListener('click', () => {
      if (!confirm('削除しますか?')) return;
      Store.state.todos = Store.state.todos.filter(x => x['todoId'] !== t['todoId']);
      this.render();
      SaveQueue.enqueue('todo:delete:' + t['todoId'], 'api_deleteTodo', [t['todoId']]);
    });
    acts.appendChild(del);
    li.appendChild(cb);
    li.appendChild(tx);
    li.appendChild(acts);
    return li;
  },

  addFromInput(inputId, scopeType, contractorId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    this.add(text, scopeType, contractorId);
    input.value = '';
  },

  add(text, scopeType, contractorId) {
    const t = {
      todoId: Utils.uuid(),
      scopeType: scopeType,
      contractorId: contractorId || '',
      text: text,
      isDone: false,
      sortOrder: Date.now(),
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    Store.state.todos.push(t);
    this.render();
    SaveQueue.enqueue('todo:create:' + t.todoId, 'api_createTodo', [{
      scopeType: scopeType, contractorId: contractorId || '', text: text
    }]);
  }
};

/* ================= DailyMemoModal (日付別タスクメモ) ================= */
const DailyMemoModal = {
  _saveTimer: null,
  _currentDate: null,

  /** 表示日付のタスク/目標フィルタ:
   *  - 未完了は常に表示(自然に翌日へ繰り越される)
   *  - 完了したものは「完了した日」のビューにだけ表示(✓付き)
   */
  _filterForDate(items, viewDate) {
    return items.filter(t => {
      if (!t['isDone']) return true;
      const cd = t['completedDate'] || '';
      return cd && cd === viewDate;
    });
  },

  /** 構造化された短期目標+本日のタスクから読取専用プレビュー文字列を生成 */
  _buildStructuredPreview(viewDate) {
    const date = viewDate || this._currentDate || Store.state.today;
    const goalsAll = Store.state.todos
      .filter(t => t['scopeType'] === 'oku-goal')
      .sort((a, b) => String(a['dueDate']||'9999').localeCompare(String(b['dueDate']||'9999')));
    const tasksAll = Store.state.todos
      .filter(t => t['scopeType'] === 'oku-task' || t['scopeType'] === 'oku-today')
      .sort((a, b) => (a['sortOrder']||0) - (b['sortOrder']||0));

    const goals = this._filterForDate(goalsAll, date);
    const tasks = this._filterForDate(tasksAll, date);

    let s = '🎯 短期目標:\n';
    if (goals.length === 0) {
      s += '  (なし)\n';
    } else {
      goals.forEach(g => {
        const mark = g['isDone'] ? '☑' : '☐';
        const due = g['dueDate'] ? `[期日:${g['dueDate']}]` : '';
        s += `  ${mark} ${g['text']||''} ${due}\n`.replace(/\s+$/, '\n');
      });
    }
    s += '\n📋 本日のタスク:\n';
    if (tasks.length === 0) {
      s += '  (なし)\n';
    } else {
      tasks.forEach((t, i) => {
        const code = (i < 20) ? String.fromCodePoint(0x2460 + i) : '(' + (i+1) + ')';
        const mark = t['isDone'] ? '☑' : '☐';
        s += `  ${mark} ${code} ${t['text']||''}\n`;
      });
    }
    return s;
  },

  /** 完全プレビュー(構造化部 + 自由メモ部)— DailyMemo の preview 列に保存 */
  _buildFullPreview(userMemo) {
    const struct = this._buildStructuredPreview();
    const memoText = (userMemo || '').trim();
    return struct + '\n📝 メモ:\n' + (memoText ? memoText.split('\n').map(l => '  ' + l).join('\n') : '  (なし)') + '\n';
  },

  async open(date) {
    if (!date) date = Store.state.today;
    this._currentDate = date;
    const modal = UI.openModal();
    modal.classList.add('modal-tall');
    const parsed = Utils.parseDate(date);
    const titleDate = parsed
      ? `${parsed.getFullYear()}年${parsed.getMonth()+1}月${parsed.getDate()}日(${Utils.dow(date)})`
      : date;
    const isToday = date === Store.state.today;
    const isPast  = date < Store.state.today;

    const headerLabel = isPast ? '📓 過去のタスク' : (isToday ? '📓 本日のタスク' : '📓 タスクメモ');
    const bodyHtml = isPast
      ? `
        <section class="task-section task-section-readonly">
          <h3 class="task-section-title">📜 ${titleDate} の記録(閲覧のみ)</h3>
          <p class="task-section-hint">過去日のため編集できません。</p>
          <pre id="memo-readonly-pre" class="memo-readonly">読込中…</pre>
        </section>
      `
      : `
        <section class="task-section task-section-goals">
          <h3 class="task-section-title">🎯 短期目標</h3>
          <p class="task-section-hint">期日付きの目標。チェックで完了し消えます(完了するまで毎日繰り越し)。</p>
          <div class="task-add-row">
            <input type="text" id="goal-input" placeholder="新しい短期目標..." maxlength="200">
            <input type="date" id="goal-due" title="達成期日">
            <button class="btn-primary" id="goal-add-btn">追加</button>
          </div>
          <ul class="task-list" id="goal-list"></ul>
        </section>

        <section class="task-section task-section-tasks">
          <h3 class="task-section-title">📋 本日のタスク</h3>
          <p class="task-section-hint">①②③… 自動採番。チェックで完了し消えます(完了するまで毎日繰り越し)。</p>
          <div class="task-add-row">
            <input type="text" id="task-input" placeholder="新しいタスク..." maxlength="200">
            <button class="btn-primary" id="task-add-btn">追加</button>
          </div>
          <ul class="task-list" id="task-list"></ul>
        </section>

        <section class="task-section task-section-memo">
          <h3 class="task-section-title">📝 統合プレビュー & 自由メモ — <span id="memo-section-date">${titleDate}</span></h3>
          <p class="task-section-hint">上の枠は構造化セクションのライブプレビュー(読取専用)。下の枠だけが編集・保存できます。</p>
          <pre id="memo-preview-pre" class="memo-readonly">(プレビュー)</pre>
          <textarea id="daily-memo-textarea"
            placeholder="読み込み中..."
            spellcheck="false"></textarea>
        </section>
      `;

    modal.innerHTML = `
      <div class="modal-header">
        <div class="modal-title" id="memo-title">${headerLabel} — ${titleDate}</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="btn-ghost" id="memo-print-btn" title="このメモを印刷 / PDF保存">🖨 印刷</button>
          ${isPast ? '' : '<button class="btn-ghost" id="memo-mode-toggle" title="編集モード切替">✏ 編集</button>'}
          <span id="memo-save-status" class="memo-save-status">読込中…</span>
          <button class="modal-close" onclick="DailyMemoModal.close()">×</button>
        </div>
      </div>
      <div class="memo-toolbar">
        <button class="btn-ghost memo-nav-btn" id="memo-prev" title="前日">◀</button>
        <input type="date" id="memo-date-picker" value="${date}">
        <button class="btn-ghost memo-nav-btn" id="memo-next" title="翌日">▶</button>
        <button class="btn-ghost memo-nav-btn" id="memo-today-btn" title="本日へ">本日</button>
        <div style="flex:1"></div>
        <button class="btn-ghost" id="memo-list-btn" title="過去メモ一覧">📋 過去メモ一覧</button>
      </div>
      <div class="modal-body daily-memo-body">
        ${bodyHtml}
      </div>
      <div class="modal-footer">
        <span class="memo-hint">編集 1.5 秒後に自動保存されます</span>
        <div style="flex:1"></div>
        <button class="btn-ghost" onclick="DailyMemoModal.close()">閉じる</button>
      </div>
    `;

    // Navigation handlers
    document.getElementById('memo-prev').addEventListener('click', () => this.navigate(-1));
    document.getElementById('memo-next').addEventListener('click', () => this.navigate(+1));
    document.getElementById('memo-today-btn').addEventListener('click', () => this.gotoDate(Store.state.today));
    document.getElementById('memo-date-picker').addEventListener('change', (e) => {
      if (e.target.value) this.gotoDate(e.target.value);
    });
    document.getElementById('memo-list-btn').addEventListener('click', () => this.openList());

    // 印刷ボタン(過去日でも有効)
    const earlyPrintBtn = document.getElementById('memo-print-btn');
    if (earlyPrintBtn) {
      earlyPrintBtn.addEventListener('click', () => this.print(date, titleDate));
    }

    // Past view: load saved snapshot only and exit
    if (isPast) {
      const status = document.getElementById('memo-save-status');
      const pre = document.getElementById('memo-readonly-pre');
      try {
        const r = await API.call('api_getDailyMemo', date);
        const display = (r && (r.preview || r.text)) || '';
        pre.textContent = display || '(この日のメモはありません)';
        status.textContent = '閲覧のみ';
        status.className = 'memo-save-status';
      } catch (err) {
        pre.textContent = '読込エラー: ' + err.message;
        status.textContent = '✕ 読込失敗';
        status.className = 'memo-save-status error';
      }
      return;
    }

    // Structured tasks/goals
    this.renderTaskLists();

    document.getElementById('goal-add-btn').addEventListener('click', () => {
      const input = document.getElementById('goal-input');
      const due = document.getElementById('goal-due');
      const text = input.value.trim();
      if (!text) return;
      this.addItem('oku-goal', text, due.value || '');
      input.value = '';
      due.value = '';
      input.focus();
    });
    document.getElementById('goal-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('goal-add-btn').click(); }
    });

    document.getElementById('task-add-btn').addEventListener('click', () => {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      this.addItem('oku-task', text, '');
      input.value = '';
      input.focus();
    });
    document.getElementById('task-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('task-add-btn').click(); }
    });

    const ta = document.getElementById('daily-memo-textarea');
    const status = document.getElementById('memo-save-status');

    // 1) サーバから取得
    try {
      const r = await API.call('api_getDailyMemo', date);
      const text = (r && r.text) || '';
      ta.value = text; // 空ならそのまま空欄。テンプレートは挿入しない。
      ta.placeholder = 'メモ:\n  …自由に記入してください';
      status.textContent = '✓ 保存済み';
      status.className = 'memo-save-status saved';
    } catch (err) {
      ta.value = '';
      ta.placeholder = '読込エラー: ' + err.message;
      status.textContent = '✕ 読込失敗';
      status.className = 'memo-save-status error';
    }

    // 2) 編集 → debounce 自動保存 + プレビュー枠を即時更新
    const debouncedSave = Utils.debounce(() => this.save(), 1500);
    ta.addEventListener('input', () => {
      status.textContent = '● 未保存';
      status.className = 'memo-save-status unsaved';
      this._refreshPreviewPane();
      debouncedSave();
    });
    // 初回プレビュー
    this._refreshPreviewPane();

    // 3) Enter キーで丸数字を自動継続(①②③ → ④⑤⑥…)
    ta.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' || e.shiftKey || e.isComposing || e.keyCode === 229) return;
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      if (start !== end) return; // 範囲選択中はスキップ
      const value = ta.value;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const lineEndIdx = value.indexOf('\n', start);
      const lineEnd = lineEndIdx === -1 ? value.length : lineEndIdx;
      const currentLine = value.substring(lineStart, lineEnd);

      // 丸数字 ①(U+2460) ～ ⑳(U+2473) を検出
      const m = currentLine.match(/^(\s*)([\u2460-\u2473])(\s*)(.*)$/);
      if (!m) return;

      const indent = m[1];
      const num = m[2];
      const sep = m[3] || ' ';
      const content = m[4];

      // 内容が空 → 番号を削除して箇条書きを終了
      if (!content.trim()) {
        e.preventDefault();
        const newValue = value.substring(0, lineStart) + value.substring(lineEnd);
        ta.value = newValue;
        ta.selectionStart = ta.selectionEnd = lineStart;
        ta.dispatchEvent(new Event('input'));
        return;
      }

      // 次の丸数字を生成
      const code = num.codePointAt(0);
      if (code >= 0x2473) return; // ⑳ を超えたら何もしない(通常 Enter)
      const nextNum = String.fromCodePoint(code + 1);

      e.preventDefault();
      const insert = '\n' + indent + nextNum + sep;
      ta.value = value.substring(0, start) + insert + value.substring(start);
      const cursor = start + insert.length;
      ta.selectionStart = ta.selectionEnd = cursor;
      ta.dispatchEvent(new Event('input'));
    });

    // 4) ビュー/編集モード切替の初期化(デフォルト = ビュー)
    modal.classList.add('mode-view');
    const toggleBtn = document.getElementById('memo-mode-toggle');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const isView = modal.classList.contains('mode-view');
        modal.classList.toggle('mode-view', !isView);
        modal.classList.toggle('mode-edit', isView);
        toggleBtn.textContent = isView ? '👁 プレビュー' : '✏ 編集';
        if (isView) {
          // 編集モードへ → textarea にフォーカス
          setTimeout(() => ta.focus(), 50);
        }
      });
    }
    // 5) 初期プレビューを再構築(現在の構造化状態 + 読込済テキスト)
    this._refreshPreviewPane();
  },

  async save() {
    const ta = document.getElementById('daily-memo-textarea');
    const status = document.getElementById('memo-save-status');
    if (!ta || !this._currentDate) return;
    const text = ta.value;
    const preview = this._buildFullPreview(text);
    status.textContent = '⟳ 保存中…';
    status.className = 'memo-save-status saving';
    try {
      await API.call('api_saveDailyMemo', this._currentDate, text, preview);
      status.textContent = '✓ 保存済み';
      status.className = 'memo-save-status saved';
    } catch (err) {
      status.textContent = '✕ 保存失敗';
      status.className = 'memo-save-status error';
      UI.toast('保存エラー: ' + err.message, 'error');
    }
  },

  /** ライブプレビュー枠を再描画(構造化セクションが変わった時に呼ぶ) */
  _refreshPreviewPane() {
    const pre = document.getElementById('memo-preview-pre');
    if (!pre) return;
    const ta = document.getElementById('daily-memo-textarea');
    pre.textContent = this._buildFullPreview(ta ? ta.value : '');
  },

  async close() {
    // Save pending edits before closing
    const status = document.getElementById('memo-save-status');
    if (status && status.classList.contains('unsaved')) {
      await this.save();
    }
    this._currentDate = null;
    UI.closeModal();
  },

  /** delta=±N で日付を移動 */
  async navigate(delta) {
    if (!this._currentDate) return;
    const next = Utils.addDays(this._currentDate, delta);
    await this.gotoDate(next);
  },

  /** 任意の日付に切り替え。未保存があれば先に保存。 */
  async gotoDate(date) {
    if (!date) return;
    const status = document.getElementById('memo-save-status');
    if (status && status.classList.contains('unsaved')) {
      await this.save();
    }
    UI.closeModal();
    await this.open(date);
  },

  /** 構造化された 短期目標 + 本日のタスク をレンダリング */
  renderTaskLists() {
    const goalList = document.getElementById('goal-list');
    const taskList = document.getElementById('task-list');
    if (!goalList || !taskList) return;

    const viewDate = this._currentDate || Store.state.today;

    // 短期目標(期日順、未完了 + 当日完了したもの)
    const goalsAll = Store.state.todos
      .filter(t => t['scopeType'] === 'oku-goal')
      .sort((a, b) => String(a['dueDate']||'9999').localeCompare(String(b['dueDate']||'9999')));
    const goals = this._filterForDate(goalsAll, viewDate);

    goalList.innerHTML = '';
    if (goals.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'task-empty';
      empty.textContent = '短期目標はまだありません';
      goalList.appendChild(empty);
    } else {
      goals.forEach((t) => goalList.appendChild(this.buildTaskItem(t, true, null)));
    }

    // 本日のタスク(sortOrder順、未完了 + 当日完了したもの)
    // ※ scopeType='oku-task'(新)と 'oku-today'(旧)の両方を拾う
    const tasksAll = Store.state.todos
      .filter(t => t['scopeType'] === 'oku-task' || t['scopeType'] === 'oku-today')
      .sort((a, b) => (a['sortOrder']||0) - (b['sortOrder']||0));
    const tasks = this._filterForDate(tasksAll, viewDate);

    taskList.innerHTML = '';
    if (tasks.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'task-empty';
      empty.textContent = '本日のタスクはまだありません';
      taskList.appendChild(empty);
    } else {
      tasks.forEach((t, i) => taskList.appendChild(this.buildTaskItem(t, false, i + 1)));
    }

    // 構造化セクションが変わったらライブプレビュー枠も更新し、
    // DailyMemo の preview スナップショットも保存し直す
    this._refreshPreviewPane();
    if (this._currentDate === Store.state.today) {
      // 即時ではなく軽くdebounceして連続更新を吸収
      clearTimeout(this._structSaveTimer);
      this._structSaveTimer = setTimeout(() => this.save(), 800);
    }
  },

  /** タスク 1 件のリストアイテムを生成 */
  buildTaskItem(t, withDue, indexOrNull) {
    const li = document.createElement('li');
    li.className = 'task-item' + (t['isDone'] ? ' done' : '');

    // ① ② ③ … 自動採番(本日のタスクのみ)
    if (indexOrNull != null) {
      const num = document.createElement('span');
      num.className = 'task-num';
      // U+2460 = ① / U+2473 = ⑳
      const code = (indexOrNull <= 20) ? (0x2460 + indexOrNull - 1) : null;
      num.textContent = code != null ? String.fromCodePoint(code) : ('(' + indexOrNull + ')');
      li.appendChild(num);
    }

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'task-check';
    cb.checked = !!t['isDone'];
    cb.title = 'チェックで本日完了(翌日には繰り越しません)';
    cb.addEventListener('change', () => {
      const isDone = cb.checked;
      const completedDate = isDone ? Store.state.today : '';
      t['isDone'] = isDone;
      t['completedDate'] = completedDate;
      li.classList.toggle('done', isDone);
      SaveQueue.enqueue('todo:update:' + t['todoId'], 'api_updateTodo',
        [t['todoId'], { isDone: isDone, completedDate: completedDate }]);
      this.renderTaskLists();
      UI.toast(isDone ? '完了しました(翌日繰り越されません)' : '未完了に戻しました', 'success');
    });
    li.appendChild(cb);

    const tx = document.createElement('span');
    tx.className = 'task-text';
    tx.textContent = t['text'] || '';
    tx.contentEditable = 'true';
    tx.addEventListener('blur', () => {
      const nv = tx.textContent.trim();
      if (nv && nv !== t['text']) {
        t['text'] = nv;
        SaveQueue.enqueue('todo:update:' + t['todoId'], 'api_updateTodo', [t['todoId'], { text: nv }]);
      }
    });
    tx.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); tx.blur(); }
    });
    li.appendChild(tx);

    if (withDue) {
      const due = document.createElement('input');
      due.type = 'date';
      due.className = 'task-due';
      due.value = t['dueDate'] || '';
      due.title = '達成期日';
      due.addEventListener('change', () => {
        t['dueDate'] = due.value;
        SaveQueue.enqueue('todo:update:' + t['todoId'], 'api_updateTodo', [t['todoId'], { dueDate: due.value }]);
        this.renderTaskLists();
      });
      li.appendChild(due);

      // 過日 / 当日 ハイライト
      if (t['dueDate']) {
        const today = Store.state.today;
        if (t['dueDate'] < today) li.classList.add('overdue');
        else if (t['dueDate'] === today) li.classList.add('due-today');
      }
    }

    const del = document.createElement('button');
    del.className = 'task-del';
    del.textContent = '削除';
    del.title = 'この項目を削除';
    del.addEventListener('click', () => {
      if (!confirm('削除しますか?')) return;
      Store.state.todos = Store.state.todos.filter(x => x['todoId'] !== t['todoId']);
      SaveQueue.enqueue('todo:delete:' + t['todoId'], 'api_deleteTodo', [t['todoId']]);
      this.renderTaskLists();
    });
    li.appendChild(del);

    return li;
  },

  /** 構造化アイテムを追加(scopeType: 'oku-goal' | 'oku-task') */
  addItem(scopeType, text, dueDate) {
    const t = {
      todoId: Utils.uuid(),
      scopeType: scopeType,
      contractorId: '',
      text: text,
      isDone: false,
      sortOrder: Date.now(),
      dueDate: dueDate || '',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    Store.state.todos.push(t);
    this.renderTaskLists();
    SaveQueue.enqueue('todo:create:' + t.todoId, 'api_createTodo', [{
      scopeType: scopeType,
      contractorId: '',
      text: text,
      dueDate: dueDate || ''
    }]);
  },

  /** 単独で過去メモ一覧を開く(ガント上の専用ボタン用) */
  openListStandalone() {
    this._currentDate = Store.state.today; // 戻る先を今日にしておく
    this.openList();
  },

  /** 過去メモ一覧モーダルを開く(年/月/日プルダウンでフィルタ可能) */
  async openList() {
    // Save current before switching view
    const status = document.getElementById('memo-save-status');
    if (status && status.classList.contains('unsaved')) {
      await this.save();
    }
    const returnDate = this._currentDate;

    UI.closeModal();
    const modal = UI.openModal();
    modal.classList.add('modal-tall');
    modal.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">📋 過去のタスクメモ一覧</div>
        <button class="modal-close" onclick="UI.closeModal()">×</button>
      </div>
      <div class="memo-filter-bar">
        <span class="filter-label">フィルタ:</span>
        <select id="filter-year"><option value="">全年</option></select>
        <span>年</span>
        <select id="filter-month"><option value="">全月</option></select>
        <span>月</span>
        <select id="filter-day"><option value="">全日</option></select>
        <span>日</span>
        <button class="btn-ghost" id="filter-clear">クリア</button>
        <div style="flex:1"></div>
        <span id="filter-count" class="filter-count"></span>
      </div>
      <div class="modal-body memo-list-body">
        <div id="memo-list-loading" style="padding:20px;text-align:center;color:var(--text-muted)">読込中…</div>
        <ul id="memo-list-ul" class="memo-list" style="display:none"></ul>
        <div id="memo-list-empty" style="display:none;padding:40px;text-align:center;color:var(--text-muted)">
          条件に一致するメモがありません
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="memo-list-back">← 戻る</button>
      </div>
    `;
    document.getElementById('memo-list-back').addEventListener('click', () => {
      UI.closeModal();
      this.open(returnDate || Store.state.today);
    });

    // Populate month / day pulldowns
    const monthSel = document.getElementById('filter-month');
    for (let m = 1; m <= 12; m++) {
      const o = document.createElement('option');
      o.value = String(m);
      o.textContent = String(m);
      monthSel.appendChild(o);
    }
    const daySel = document.getElementById('filter-day');
    for (let d = 1; d <= 31; d++) {
      const o = document.createElement('option');
      o.value = String(d);
      o.textContent = String(d);
      daySel.appendChild(o);
    }

    let allMemos = [];
    const ul = document.getElementById('memo-list-ul');
    const emptyEl = document.getElementById('memo-list-empty');
    const countEl = document.getElementById('filter-count');

    const renderFiltered = () => {
      const fy = document.getElementById('filter-year').value;
      const fm = document.getElementById('filter-month').value;
      const fd = document.getElementById('filter-day').value;
      const filtered = allMemos.filter(m => {
        const p = Utils.parseDate(m.date);
        if (!p) return false;
        if (fy && String(p.getFullYear()) !== fy) return false;
        if (fm && String(p.getMonth() + 1) !== fm) return false;
        if (fd && String(p.getDate()) !== fd) return false;
        return true;
      });
      countEl.textContent = filtered.length + ' 件';
      ul.innerHTML = '';
      if (filtered.length === 0) {
        emptyEl.style.display = 'block';
        ul.style.display = 'none';
        return;
      }
      emptyEl.style.display = 'none';
      ul.style.display = 'block';
      filtered.forEach(m => {
        const li = document.createElement('li');
        li.className = 'memo-list-item';
        const parsed = Utils.parseDate(m.date);
        const dateLabel = parsed
          ? `${parsed.getFullYear()}/${parsed.getMonth()+1}/${parsed.getDate()}(${Utils.dow(m.date)})`
          : m.date;
        const isToday = m.date === Store.state.today;

        const head = document.createElement('div');
        head.className = 'memo-list-head';
        const dateSpan = document.createElement('span');
        dateSpan.className = 'memo-list-date' + (isToday ? ' today' : '');
        dateSpan.textContent = dateLabel + (isToday ? ' (本日)' : '');
        const badge = document.createElement('span');
        badge.className = 'memo-list-badge';
        badge.textContent = m.updatedAt ? '更新: ' + m.updatedAt.replace('T', ' ').substring(0, 16) : '';
        head.appendChild(dateSpan);
        head.appendChild(badge);

        const preview = document.createElement('div');
        preview.className = 'memo-list-preview';
        preview.textContent = m.preview || '(空)';

        li.appendChild(head);
        li.appendChild(preview);
        li.addEventListener('click', () => this.openPreviewOnly(m.date, returnDate));
        ul.appendChild(li);
      });
    };

    document.getElementById('filter-year').addEventListener('change', renderFiltered);
    monthSel.addEventListener('change', renderFiltered);
    daySel.addEventListener('change', renderFiltered);
    document.getElementById('filter-clear').addEventListener('click', () => {
      document.getElementById('filter-year').value = '';
      monthSel.value = '';
      daySel.value = '';
      renderFiltered();
    });

    try {
      allMemos = (await API.call('api_listDailyMemos')) || [];
      document.getElementById('memo-list-loading').style.display = 'none';
      // Populate year pulldown from data
      const yearSel = document.getElementById('filter-year');
      const years = Array.from(new Set(allMemos.map(m => {
        const p = Utils.parseDate(m.date);
        return p ? p.getFullYear() : null;
      }).filter(y => y !== null))).sort((a, b) => b - a);
      // Always include current year as fallback
      const cy = new Date().getFullYear();
      if (!years.includes(cy)) years.unshift(cy);
      years.forEach(y => {
        const o = document.createElement('option');
        o.value = String(y);
        o.textContent = String(y);
        yearSel.appendChild(o);
      });

      if (allMemos.length === 0) {
        emptyEl.textContent = 'まだ保存されたメモがありません';
        emptyEl.style.display = 'block';
        countEl.textContent = '0 件';
        return;
      }
      renderFiltered();
    } catch (err) {
      document.getElementById('memo-list-loading').textContent = '読込エラー: ' + err.message;
    }
  },

  /** 過去メモを読取専用でプレビュー(編集不可) */
  async openPreviewOnly(date, returnDate) {
    UI.closeModal();
    const modal = UI.openModal();
    modal.classList.add('modal-tall');
    const parsed = Utils.parseDate(date);
    const titleDate = parsed
      ? `${parsed.getFullYear()}年${parsed.getMonth()+1}月${parsed.getDate()}日(${Utils.dow(date)})`
      : date;
    modal.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">📜 ${titleDate} のメモ(閲覧のみ)</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="btn-ghost" id="memo-preview-print">🖨 印刷</button>
          <button class="modal-close" onclick="UI.closeModal()">×</button>
        </div>
      </div>
      <div class="modal-body">
        <pre id="memo-preview-content" class="memo-readonly">読込中…</pre>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="memo-preview-back">← 一覧へ戻る</button>
      </div>
    `;
    document.getElementById('memo-preview-back').addEventListener('click', () => {
      UI.closeModal();
      this._currentDate = returnDate || Store.state.today;
      this.openList();
    });
    document.getElementById('memo-preview-print').addEventListener('click', () => {
      this.printContent(
        document.getElementById('memo-preview-content').textContent,
        titleDate
      );
    });
    try {
      const r = await API.call('api_getDailyMemo', date);
      const display = (r && (r.preview || r.text)) || '';
      document.getElementById('memo-preview-content').textContent =
        display || '(この日のメモはありません)';
    } catch (err) {
      document.getElementById('memo-preview-content').textContent = '読込エラー: ' + err.message;
    }
  },

  /** 現在開いているモーダルのプレビュー内容を取得して印刷 */
  print(date, titleDate) {
    let content = '';
    // モード判別: 過去日読取専用 / 今日のプレビュー(編集モード問わず)
    const past = document.getElementById('memo-readonly-pre');
    if (past) {
      content = past.textContent || '';
    } else {
      const ta = document.getElementById('daily-memo-textarea');
      content = this._buildFullPreview(ta ? ta.value : '');
    }
    this.printContent(content, titleDate);
  },

  /** 任意の文字列を印刷用 iframe に流し込んで印刷ダイアログを起動 */
  printContent(content, titleDate) {
    const safe = (s) => String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    const printedAt = (() => {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    })();

    const html = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本日のタスク — ${safe(titleDate)}</title>
<style>
  @page { size: A4; margin: 18mm 16mm 18mm 16mm; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Noto Sans JP', 'Yu Gothic', 'Hiragino Sans', sans-serif;
    color: #111;
    background: #fff;
    font-size: 12pt;
    line-height: 1.7;
  }
  .doc { padding: 0; color: #111; }
  .doc-header {
    border-bottom: 2px solid #111;
    padding-bottom: 10px;
    margin-bottom: 18px;
  }
  .doc-title { font-size: 18pt; font-weight: 700; letter-spacing: 1px; margin: 0; }
  .doc-subtitle { font-size: 13pt; color: #333; margin-top: 4px; }
  .doc-body {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: 'Noto Sans JP', 'Yu Gothic', 'Hiragino Sans', monospace;
    font-size: 12pt;
    line-height: 1.85;
    color: #111;
    margin: 0;
  }
  .doc-footer {
    margin-top: 24px;
    padding-top: 8px;
    border-top: 1px dashed #888;
    font-size: 10pt;
    color: #555;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="doc">
    <div class="doc-header">
      <h1 class="doc-title">📓 タスクメモ</h1>
      <div class="doc-subtitle">${safe(titleDate)}</div>
    </div>
    <pre class="doc-body">${safe(content)}</pre>
    <div class="doc-footer">
      <span>電気工事スケジューリング</span>
      <span>印刷日: ${safe(printedAt)}</span>
    </div>
  </div>
</body>
</html>`;

    // 画面外に隠した iframe を作って書き込む
    const old = document.getElementById('print-iframe-temp');
    if (old) old.remove();
    const iframe = document.createElement('iframe');
    iframe.id = 'print-iframe-temp';
    iframe.style.cssText = 'position:fixed;right:-9999px;bottom:-9999px;width:0;height:0;border:0;';
    document.body.appendChild(iframe);

    const doc = iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();

    // レンダリング後に印刷起動
    const triggerPrint = () => {
      try {
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
      } catch (e) {
        UI.toast('印刷ダイアログが開けませんでした: ' + e.message, 'error');
      }
      setTimeout(() => { try { iframe.remove(); } catch (e) {} }, 2000);
    };
    if (iframe.contentWindow.document.readyState === 'complete') {
      setTimeout(triggerPrint, 250);
    } else {
      iframe.onload = () => setTimeout(triggerPrint, 250);
    }
  }
};

/* ================= OkuTaskModal (legacy structured todos — kept as fallback) ================= */
const OkuTaskModal = {
  open() {
    const modal = UI.openModal();
    modal.classList.add('modal-tall');
    modal.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">📓 本日のタスク管理(奥氏)</div>
        <button class="modal-close" onclick="UI.closeModal()">×</button>
      </div>
      <div class="modal-body oku-task-body">

        <section class="task-section">
          <h3 class="task-section-title">🎯 短期目標</h3>
          <p class="task-section-hint">期日付きの目標。完了チェックで削除されます。</p>
          <div class="task-add-row">
            <input type="text" id="goal-input" placeholder="新しい短期目標..." maxlength="200">
            <input type="date" id="goal-due" title="達成期日">
            <button class="btn-primary" id="goal-add-btn">追加</button>
          </div>
          <ul class="task-list" id="goal-list"></ul>
        </section>

        <section class="task-section">
          <h3 class="task-section-title">📋 本日のやることリスト</h3>
          <p class="task-section-hint">完了チェックで削除されます。</p>
          <div class="task-add-row">
            <input type="text" id="today-input" placeholder="新しいやることを追加..." maxlength="200">
            <button class="btn-primary" id="today-add-btn">追加</button>
          </div>
          <ul class="task-list" id="today-list"></ul>
        </section>

      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="UI.closeModal()">閉じる</button>
      </div>
    `;
    this.renderLists();

    document.getElementById('goal-add-btn').addEventListener('click', () => {
      const input = document.getElementById('goal-input');
      const due = document.getElementById('goal-due');
      const text = input.value.trim();
      if (!text) return;
      this.add('oku-goal', text, due.value || '');
      input.value = '';
      due.value = '';
    });
    document.getElementById('goal-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('goal-add-btn').click();
    });

    document.getElementById('today-add-btn').addEventListener('click', () => {
      const input = document.getElementById('today-input');
      const text = input.value.trim();
      if (!text) return;
      this.add('oku-today', text, '');
      input.value = '';
    });
    document.getElementById('today-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('today-add-btn').click();
    });
  },

  renderLists() {
    const goalList = document.getElementById('goal-list');
    const todayList = document.getElementById('today-list');
    if (!goalList || !todayList) return;

    const goals = Store.state.todos
      .filter(t => t['scopeType'] === 'oku-goal' && !t['isDone'])
      .sort((a, b) => String(a['dueDate']||'9999').localeCompare(String(b['dueDate']||'9999')));
    const todays = Store.state.todos
      .filter(t => t['scopeType'] === 'oku-today' && !t['isDone'])
      .sort((a, b) => (a['sortOrder']||0) - (b['sortOrder']||0));

    goalList.innerHTML = '';
    if (goals.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'task-empty';
      empty.textContent = '短期目標はまだありません';
      goalList.appendChild(empty);
    } else {
      goals.forEach(t => goalList.appendChild(this.buildItem(t, true)));
    }

    todayList.innerHTML = '';
    if (todays.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'task-empty';
      empty.textContent = '本日のやることはまだありません';
      todayList.appendChild(empty);
    } else {
      todays.forEach(t => todayList.appendChild(this.buildItem(t, false)));
    }
  },

  buildItem(t, withDue) {
    const li = document.createElement('li');
    li.className = 'task-item';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'task-check';
    cb.title = '完了でリストから削除';
    cb.addEventListener('change', () => {
      // Mark done → delete from server (item disappears)
      Store.state.todos = Store.state.todos.filter(x => x['todoId'] !== t['todoId']);
      SaveQueue.enqueue('todo:delete:' + t['todoId'], 'api_deleteTodo', [t['todoId']]);
      this.renderLists();
      UI.toast('完了しました', 'success');
    });

    const tx = document.createElement('span');
    tx.className = 'task-text';
    tx.textContent = t['text'] || '';
    tx.contentEditable = 'true';
    tx.addEventListener('blur', () => {
      const nv = tx.textContent.trim();
      if (nv && nv !== t['text']) {
        t['text'] = nv;
        SaveQueue.enqueue('todo:update:' + t['todoId'], 'api_updateTodo', [t['todoId'], { text: nv }]);
      }
    });

    li.appendChild(cb);
    li.appendChild(tx);

    if (withDue) {
      const due = document.createElement('input');
      due.type = 'date';
      due.className = 'task-due';
      due.value = t['dueDate'] || '';
      due.title = '達成期日';
      due.addEventListener('change', () => {
        t['dueDate'] = due.value;
        SaveQueue.enqueue('todo:update:' + t['todoId'], 'api_updateTodo', [t['todoId'], { dueDate: due.value }]);
        this.renderLists();
      });
      li.appendChild(due);

      // Overdue / due-today highlight
      if (t['dueDate']) {
        const today = Store.state.today;
        if (t['dueDate'] < today) li.classList.add('overdue');
        else if (t['dueDate'] === today) li.classList.add('due-today');
      }
    }

    const del = document.createElement('button');
    del.className = 'task-del';
    del.textContent = '削除';
    del.title = 'この項目を削除';
    del.addEventListener('click', () => {
      if (!confirm('削除しますか?')) return;
      Store.state.todos = Store.state.todos.filter(x => x['todoId'] !== t['todoId']);
      SaveQueue.enqueue('todo:delete:' + t['todoId'], 'api_deleteTodo', [t['todoId']]);
      this.renderLists();
    });
    li.appendChild(del);

    return li;
  },

  add(scopeType, text, dueDate) {
    const t = {
      todoId: Utils.uuid(),
      scopeType: scopeType,
      contractorId: '',
      text: text,
      isDone: false,
      sortOrder: Date.now(),
      dueDate: dueDate || '',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    Store.state.todos.push(t);
    this.renderLists();
    SaveQueue.enqueue('todo:create:' + t.todoId, 'api_createTodo', [{
      scopeType: scopeType,
      contractorId: '',
      text: text,
      dueDate: dueDate || ''
    }]);
  }
};

  const sel = document.getElementById('gantt-days-select');
  if (sel) sel.addEventListener('change', (e) => {
    Store.state.ganttDays = parseInt(e.target.value, 10) || 180;
    Gantt.render();
  });
  App.init();
});
